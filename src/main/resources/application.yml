spring:
  application:
    name: everrise-backend
  profiles:
    default: dev
  jpa:
    open-in-view: false
  main:
    allow-circular-references: true

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: "your-secret-key-change-this-in-production-environment-please"
    expiration: 3600000


