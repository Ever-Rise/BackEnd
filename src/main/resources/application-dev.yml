spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/everrise_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    br.com.everrise: DEBUG

springdoc:
  swagger-ui:
    enabled: true

