spring:
  datasource:
    url: jdbc:h2:mem:everrise_dev
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        ddl-auto: create-drop
      enabled: true
  flyway:
    enabled: false

app:
  jwt:
    secret: "your-secret-key-change-this-in-production-environment-please"
    expiration: 3600000
  mqtt:
    topic:
      command: "everrise/equipamento/{id}/commands"
      telemetry: "everrise/equipamento/{id}/telemetry"

mqtt:
  enabled: false

