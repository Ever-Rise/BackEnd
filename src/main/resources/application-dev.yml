spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://mysql:3306/everrise_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  data:
    redis:
      host: redis
      port: 6379
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: "your-secret-key-for-development-min-32-chars-long-please-use-strong-key-for-prod!"
    expiration: 3600000
    refresh-expiration: 86400000

logging:
  level:
    br.com.everrise: DEBUG

springdoc:
  swagger-ui:
    enabled: true

