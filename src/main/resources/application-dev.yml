spring:
  datasource:
    url: jdbc:mysql://localhost:3306/everrise_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: everrise
    password: everrise123
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: "your-secret-key-change-this-in-production-environment-please"
    expiration: 3600000
    refresh-expiration: 604800000
  mqtt:
    topic:
      command: "everrise/equipamento/{id}/commands"
      telemetry: "everrise/equipamento/{id}/telemetry"

mqtt:
  enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
  packages-to-scan: br.com.everrise.controller


