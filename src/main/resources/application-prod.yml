spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/everrise}
    username: ${DB_USERNAME:everrise}
    password: ${DB_PASSWORD:everrise}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      max-lifetime: 1800000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

